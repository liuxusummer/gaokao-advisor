<script type="text/javascript">
function gotopage(obj){
    var PN = obj.page.value;
    var Num = parseInt(PN);
    if (Num > 148) {
        window.alert("没有那么多页");
        return false;
    }
    pagenum = (Num - 1) * 20;
    var actionStr = "https://gaokao.chsi.com.cn/sch/search--province-%E6%B5%99%E6%B1%9F,start-0.dhtml";
    actionStr = actionStr.replace(/start-\d+/, "start-" + pagenum);
    obj.action= encodeURI(actionStr);
    return true;
}
</script>
